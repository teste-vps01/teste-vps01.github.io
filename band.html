<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página com fundo preto e caixas verdes e pretas com brilho</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            flex-direction: column;
            overflow: auto;
        }

        .caixa {
            width: 80%;
            height: 150px;
            margin: 5px auto;
            padding: 0px;
            color: white;
            border: 2px solid black;
            border-radius: 8px;
            box-shadow: 0 0 30px 10px rgba(0, 255, 0, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: box-shadow 0.3s ease-in-out;
            flex-direction: column;
        }

        .caixa:nth-child(odd) {
            background: linear-gradient(45deg, green, black);
        }

        .caixa:nth-child(even) {
            background: linear-gradient(45deg, black, green);
        }

        .caixa:hover {
            box-shadow: 0 0 40px 15px rgba(0, 255, 0, 1);
        }

        .caixa-video {
            width: 80%;
            height: 300px;
            margin: 20px auto;
            background-color: green;
            color: black;
            border: 2px solid black;
            border-radius: 8px;
            box-shadow: 0 0 30px 10px rgba(0, 255, 0, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        /* Estilo para a nova caixa */
        .nova-caixa {
            width: 80%;
            height: 100px;
            margin: 5px auto;
            padding: 0px;
            color: white;
            border: 2px solid black;
            border-radius: 8px;
            box-shadow: 0 0 30px 10px rgba(0, 255, 0, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(45deg, green, black);
        }
                .botao-fixo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 0 30px 10px rgba(0, 255, 0, 1);
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .botao-fixo:hover {
            background-color: darkgreen;
            box-shadow: 0 0 40px 15px rgba(0, 255, 0, 1);
        }
    </style>
</head>
<body>
    <div class="caixa">
        <h2>JADIEL TV HD</h2>
    </div>
    <div class="caixa">
        <h2>CANAL DA BAND</h2>
    </div>
    <div class="caixa">
        <span>🕛 HORA: <span id="hora"></span></span><br>
        <span>📆 DATA: <span id="data"></span></span><br>
        <span>🗓️ MÊS: <span id="mes"></span></span>
    </div>
    

    <div class="caixa-video">
        <video controls>
            <source src="https://cdn-1.nxplay.com.br/BAND_HD_PFZ_NX/index.m3u8">
            Seu navegador não suporta o elemento de vídeo.
        </video>

    </div>
                <div class="caixa">
        <h2>🎦:AO VIVO</h2>
    </div>

<button class="botao-fixo" id="botao-icone" onclick="window.location.href = 'index.html';">
        ↩️
    </button>

    <script>
        function formatarNumero(num) {
            return num < 10 ? '0' + num : num;
        }

        function atualizarDataHora() {
            const agora = new Date();
            const hora = formatarNumero(agora.getHours()) + ':' + formatarNumero(agora.getMinutes()) + ':' + formatarNumero(agora.getSeconds());
            const data = formatarNumero(agora.getDate()) + '/' + formatarNumero(agora.getMonth() + 1) + '/' + agora.getFullYear();
            const mes = agora.toLocaleString('default', { month: 'long' });

            document.getElementById('hora').textContent = hora;
            document.getElementById('data').textContent = data;
            document.getElementById('mes').textContent = mes;
        }

        setInterval(atualizarDataHora, 1000);
        atualizarDataHora();

        // Mover o botão fixo com o dedo
        const botao = document.getElementById('botao-icone');

        let offsetX, offsetY;

        botao.addEventListener('touchstart', function(e) {
            offsetX = e.touches[0].clientX - botao.offsetLeft;
            offsetY = e.touches[0].clientY - botao.offsetTop;
        });

        botao.addEventListener('touchmove', function(e) {
            botao.style.left = (e.touches[0].clientX - offsetX) + 'px';
            botao.style.top = (e.touches[0].clientY - offsetY) + 'px';
        });
    </script>
</body>
</html>
